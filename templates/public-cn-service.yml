# Luma manifest template — public China HTTPS service.
# Deploy with: luma deploy public-cn-service.yml
name: your-app
image: ghcr.io/your-org/your-app:latest
region: cn
exposure: cn-edge          # Cloudflare DNS -> CN Traefik -> this service
domain: app.example.com    # public hostname (Luma syncs the DNS record)
port: 3000                 # container's internal listening port
replicas: 2
env:
  NODE_ENV: production
