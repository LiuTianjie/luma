# Luma manifest template — home service exposed through the CN edge over Tailscale.
# Deploy with: luma deploy home-tailscale-relay.yml
name: home-panel
image: ghcr.io/your-org/home-panel:latest
region: home
exposure: tailscale-relay    # Cloudflare DNS -> CN Traefik -> Tailscale -> home node
domain: panel.example.com
port: 8080
publishPort: 8080            # host port published on the home node
replicas: 1
