# Luma manifest template — internal worker (no public ingress).
# Deploy with: luma deploy global-worker.yml
name: fetch-worker
image: ghcr.io/your-org/fetch-worker:latest
region: global
exposure: none
replicas: 1
env:
  QUEUE_URL: redis://redis:6379/0
# proxy: true   # uncomment for runtime HTTP/HTTPS egress through Luma
