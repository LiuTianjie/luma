# Luma manifest template — global (overseas) public HTTPS service.
# Deploy with: luma deploy public-global-service.yml
name: ai-gateway
image: ghcr.io/your-org/ai-gateway:latest
region: global
exposure: external-edge     # Cloudflare DNS -> overseas/global edge -> service
domain: ai.example.com
port: 3000
replicas: 1
dns:
  target: 198.51.100.10     # global edge IP this domain should point at
