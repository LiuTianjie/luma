name: lae-platform
compose: docker-compose.yml
region: cn

volumes:
  artifact-data:
    local:
      node: lae-core
      path: /srv/luma/lae/production/artifacts/v1
    initialize: empty
  backup-data:
    local:
      node: lae-core
      path: /srv/luma/lae/production/backups/v1
    initialize: empty
  postgres-data:
    local:
      node: lae-core
      path: /srv/luma/lae/production/postgres/v1
    initialize: empty

services:
  web:
    node: lae-core
    exposure: cn-edge
    domain: lae.itool.tech
    port: 3000
  api:
    node: lae-core
    exposure: cn-edge
    domain: lae-api.itool.tech
    port: 8080
  worker:
    node: lae-core
    exposure: none
  agent-controller:
    node: lae-core
    exposure: none
  postgres:
    node: lae-core
    exposure: none
  artifact-store:
    node: lae-core
    exposure: cn-edge
    domain: lae-artifacts.itool.tech
    port: 9000
  artifact-init:
    node: lae-core
    exposure: none
  backup:
    node: lae-core
    exposure: none
  valkey:
    node: lae-core
    exposure: none
