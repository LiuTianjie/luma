name: lae-platform-staging

services:
  web:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_LAE_UPLOAD_ORIGINS: https://lae-artifacts-staging.itool.tech
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits: {cpus: "0.75", memory: 768M}
        reservations: {cpus: "0.20", memory: 256M}

  api:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/api.Dockerfile
    environment:
      LAE_APPLICATION_IDEMPOTENCY_HMAC_KEY: ${LAE_APPLICATION_IDEMPOTENCY_HMAC_KEY}
      LAE_ADMIN_API_TOKEN: ${LAE_ADMIN_API_TOKEN}
      LAE_ARTIFACT_S3_ACCESS_KEY: ${LAE_S3_API_ACCESS_KEY}
      # Server-side analysis artifacts stay on the shared Luma task network.
      # Browser uploads keep using the public signed endpoint below.
      LAE_ARTIFACT_S3_ALLOWED_HOSTS: artifact-store
      LAE_ARTIFACT_S3_BUCKET: lae-artifacts-staging
      LAE_ARTIFACT_S3_ENDPOINT: http://artifact-store:9000
      LAE_ARTIFACT_S3_PATH_STYLE: "1"
      LAE_ARTIFACT_S3_REGION: us-east-1
      LAE_ARTIFACT_S3_SECRET_KEY: ${LAE_S3_API_SECRET_KEY}
      LAE_AUTH_HMAC_KEY: ${LAE_AUTH_HMAC_KEY}
      LAE_AUTH_HMAC_KEY_VERSION: "1"
      LAE_AUTH_EXTERNAL_MAILBOX: "1"
      LAE_AUTH_PREVIEW_EMAIL: preview@lae.invalid
      LAE_AUTH_PREVIEW_MODE: public
      LAE_BILLING_DRIVER: mock
      LAE_BILLING_HMAC_KEY: ${LAE_BILLING_HMAC_KEY}
      LAE_CREDENTIAL_BROKER_TOKEN: ${LAE_CREDENTIAL_BROKER_TOKEN}
      LAE_CORS_ALLOWED_ORIGINS: https://lae-staging.itool.tech
      LAE_DATABASE_URL: ${LAE_DATABASE_URL}
      LAE_DEPLOYMENT_IDEMPOTENCY_HMAC_KEY: ${LAE_DEPLOYMENT_IDEMPOTENCY_HMAC_KEY}
      LAE_EMAIL_DRIVER: smtp
      LAE_EMAIL_FROM: ${ITOOL_TECH_SMTP_USER}
      LAE_ENVIRONMENT: staging
      LAE_ENVIRONMENT_AEAD_KEYS: ${LAE_ENVIRONMENT_AEAD_KEYS}
      LAE_ENVIRONMENT_AEAD_KEY_VERSION: "1"
      LAE_ENVIRONMENT_CHECKSUM_HMAC_KEY: ${LAE_ENVIRONMENT_CHECKSUM_HMAC_KEY}
      LAE_LUMA_CLUSTER_ID: ${LAE_LUMA_CLUSTER_ID}
      LAE_LUMA_RUNTIME_PRINCIPAL_ID: lae-runtime
      LAE_LUMA_RUNTIME_SERVICE_TOKEN: ${LAE_LUMA_RUNTIME_SERVICE_TOKEN}
      LAE_LUMA_RUNTIME_URL: ${LAE_LUMA_CONTROL_URL}
      LAE_LUMA_SERVICE_PRINCIPAL_ID: lae-builder
      LAE_MOCK_CHECKOUT_BASE_URL: ${LAE_MOCK_CHECKOUT_BASE_URL}
      LAE_MOCK_CHECKOUT_TTL_SECONDS: "600"
      LAE_MOCK_PAYMENT_MERCHANT_ID: ${LAE_MOCK_PAYMENT_MERCHANT_ID}
      LAE_MOCK_PAYMENT_SIGNING_KEY: ${LAE_MOCK_PAYMENT_SIGNING_KEY}
      LAE_MOCK_PRICING_JSON: ${LAE_MOCK_PRICING_JSON}
      LAE_OBJECT_SOURCE_BROKER_TOKEN: ${LAE_OBJECT_SOURCE_BROKER_TOKEN}
      LAE_PUBLIC_LOGIN_URL: https://lae-staging.itool.tech/login
      LAE_RUN_MIGRATIONS: "1"
      LAE_SMTP_HOST: ${ITOOL_TECH_SMTP_HOST}
      LAE_SMTP_PASSWORD: ${ITOOL_TECH_SMTP_PASS}
      LAE_SMTP_PORT: ${ITOOL_TECH_SMTP_PORT}
      # iTool SMTP uses submission port 587, which upgrades the connection
      # with STARTTLS. Implicit TLS is reserved for port 465.
      LAE_SMTP_SECURITY: starttls
      LAE_SMTP_TIMEOUT_SECONDS: "10"
      LAE_SMTP_USERNAME: ${ITOOL_TECH_SMTP_USER}
      LAE_SOURCE_CONNECTION_AEAD_KEYS: ${LAE_SOURCE_CONNECTION_AEAD_KEYS}
      LAE_SOURCE_CONNECTION_HMAC_KEYS: ${LAE_SOURCE_CONNECTION_HMAC_KEYS}
      LAE_SOURCE_CONNECTION_IDEMPOTENCY_HMAC_KEY: ${LAE_SOURCE_CONNECTION_IDEMPOTENCY_HMAC_KEY}
      LAE_SOURCE_CONNECTION_KEY_VERSION: "1"
      LAE_SOURCE_LEASE_TTL_SECONDS: "900"
      LAE_UPLOAD_ANALYSIS_BROKER_ENABLED: "1"
      LAE_UPLOAD_DRIVER: s3
      LAE_UPLOAD_HMAC_KEY: ${LAE_UPLOAD_HMAC_KEY}
      LAE_UPLOAD_S3_ACCESS_KEY: ${LAE_S3_API_ACCESS_KEY}
      LAE_UPLOAD_S3_BUCKET: lae-uploads-staging
      LAE_UPLOAD_S3_ENDPOINT: https://lae-artifacts-staging.itool.tech
      LAE_UPLOAD_S3_REGION: us-east-1
      LAE_UPLOAD_S3_SECRET_KEY: ${LAE_S3_API_SECRET_KEY}
      LAE_WORKER_STATE_HMAC_KEY: ${LAE_WORKER_STATE_HMAC_KEY}
      LAE_WORKER_STATE_HMAC_KEY_VERSION: "1"
    depends_on:
      artifact-init:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 5
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 1G}
        reservations: {cpus: "0.25", memory: 384M}

  worker:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/worker.Dockerfile
    environment:
      LAE_ANALYSIS_CPU: "2.0"
      LAE_ANALYSIS_DISK_MIB: "4096"
      LAE_ANALYSIS_MEMORY_MIB: "2048"
      LAE_ANALYSIS_POLICY_VERSION: "2026-07-11"
      LAE_ANALYSIS_TIMEOUT_SECONDS: "300"
      LAE_ANALYZER_IMAGE_DIGEST: ${LAE_ANALYZER_IMAGE_DIGEST}
      LAE_ARTIFACT_DRIVER: s3
      LAE_ARTIFACT_S3_ACCESS_KEY: ${LAE_S3_WORKER_ACCESS_KEY}
      LAE_ARTIFACT_S3_ALLOWED_HOSTS: artifact-store
      LAE_ARTIFACT_S3_BUCKET: lae-artifacts-staging
      LAE_ARTIFACT_S3_ENDPOINT: http://artifact-store:9000
      LAE_ARTIFACT_S3_PATH_STYLE: "1"
      LAE_ARTIFACT_S3_REGION: us-east-1
      LAE_ARTIFACT_S3_SECRET_KEY: ${LAE_S3_WORKER_SECRET_KEY}
      LAE_BUILD_CREDENTIAL_LEASE_HMAC_KEY: ${LAE_BUILD_CREDENTIAL_LEASE_HMAC_KEY}
      LAE_BUILD_PLAN_SIGNING_HMAC_KEY: ${LAE_BUILD_PLAN_SIGNING_HMAC_KEY}
      LAE_BUILD_PLAN_SIGNING_KEY_ID: lae-plan-primary
      LAE_DATABASE_URL: ${LAE_DATABASE_URL}
      LAE_DEPLOYMENT_REGION: cn
      LAE_DEPLOYMENT_WORKER_ENABLED: "1"
      LAE_LIFECYCLE_TIMEOUT_SECONDS: "1800"
      LAE_LIFECYCLE_WORKER_ENABLED: "1"
      LAE_ENVIRONMENT: staging
      LAE_ENVIRONMENT_AEAD_KEYS: ${LAE_ENVIRONMENT_AEAD_KEYS}
      LAE_ENVIRONMENT_AEAD_KEY_VERSION: "1"
      LAE_ENVIRONMENT_CHECKSUM_HMAC_KEY: ${LAE_ENVIRONMENT_CHECKSUM_HMAC_KEY}
      LAE_LUMA_CLUSTER_ID: ${LAE_LUMA_CLUSTER_ID}
      LAE_LUMA_CONTROL_URL: ${LAE_LUMA_CONTROL_URL}
      LAE_LUMA_HTTP_TIMEOUT_SECONDS: "20"
      LAE_LUMA_SERVICE_PRINCIPAL_ID: lae-builder
      LAE_LUMA_SERVICE_TOKEN: ${LAE_LUMA_SERVICE_TOKEN}
      LAE_LUMA_RUNTIME_PRINCIPAL_ID: lae-runtime
      LAE_LUMA_RUNTIME_SERVICE_TOKEN: ${LAE_LUMA_RUNTIME_SERVICE_TOKEN}
      LAE_LUMA_RUNTIME_URL: ${LAE_LUMA_CONTROL_URL}
      LAE_SOURCE_LEASE_TTL_SECONDS: "900"
      LAE_UPLOAD_DRIVER: s3
      LAE_UPLOAD_HMAC_KEY: ${LAE_UPLOAD_HMAC_KEY}
      LAE_UPLOAD_S3_ACCESS_KEY: ${LAE_S3_WORKER_ACCESS_KEY}
      LAE_UPLOAD_S3_BUCKET: lae-uploads-staging
      LAE_UPLOAD_S3_ENDPOINT: http://artifact-store:9000
      LAE_UPLOAD_S3_REGION: us-east-1
      LAE_UPLOAD_S3_SECRET_KEY: ${LAE_S3_WORKER_SECRET_KEY}
      LAE_UPLOAD_SCANNER_ENABLED: "1"
      LAE_WORKER_EVENT_PAGE_LIMIT: "100"
      LAE_WORKER_IDLE_SECONDS: "2"
      LAE_WORKER_LEASE_SECONDS: "60"
      LAE_WORKER_POLL_SECONDS: "1"
      LAE_WORKER_RETRY_SECONDS: "10"
      LAE_WORKER_STATE_HMAC_KEY: ${LAE_WORKER_STATE_HMAC_KEY}
      LAE_WORKER_STATE_HMAC_KEY_VERSION: "1"
    depends_on:
      api: {condition: service_healthy}
      artifact-store: {condition: service_healthy}
      artifact-init: {condition: service_healthy}
      postgres: {condition: service_healthy}
    healthcheck:
      test: [CMD, lae-worker, --health]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 1536M}
        reservations: {cpus: "0.25", memory: 512M}

  agent-controller:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/agent-controller.Dockerfile
    environment:
      LAE_AGENT_CONTROLLER_TOKEN: ${LAE_AGENT_CONTROLLER_TOKEN}
      LAE_AGENT_AI_REQUIRED: "1"
      LAE_AGENT_LLM_API_KEY: ${LAE_AGENT_LLM_API_KEY}
      LAE_AGENT_LLM_BASE_URL: ${LAE_AGENT_LLM_BASE_URL}
      LAE_AGENT_LLM_MODEL: ${LAE_AGENT_LLM_MODEL}
      LAE_AGENT_LLM_TIMEOUT_SECONDS: "40"
      LAE_AGENT_KNOWLEDGE_PATH: /opt/lae/knowledge/v1/knowledge-pack.json
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health/ready', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits: {cpus: "0.25", memory: 256M}
        reservations: {cpus: "0.10", memory: 128M}

  postgres:
    image: 100.66.177.70:5000/lae/postgres-amd64:17@sha256:5aee909f99ab78c62f03636b6ca25a17195657605ce6782d9919ce4288595eda
    platform: linux/amd64
    environment:
      POSTGRES_DB: lae
      POSTGRES_INITDB_ARGS: --data-checksums
      POSTGRES_PASSWORD: ${LAE_POSTGRES_PASSWORD}
      POSTGRES_USER: lae
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U lae -d lae]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 12
    stop_grace_period: 60s
    deploy:
      resources:
        limits: {cpus: "1.50", memory: 2G}
        reservations: {cpus: "0.50", memory: 1G}

  artifact-store:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/minio.Dockerfile
    environment:
      # Community MinIO exposes CORS as a server-wide API setting; per-bucket
      # PutBucketCors is not implemented. This store is dedicated to one LAE
      # Web origin, so never rely on MinIO's permissive `*` default.
      MINIO_API_CORS_ALLOW_ORIGIN: https://lae-staging.itool.tech
      MINIO_ROOT_PASSWORD: ${LAE_MINIO_ROOT_PASSWORD}
      MINIO_ROOT_USER: ${LAE_MINIO_ROOT_USER}
    volumes: [artifact-data:/data]
    healthcheck:
      test: [CMD, /usr/local/bin/lae-minio-healthcheck]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits: {cpus: "1.00", memory: 1G}
        reservations: {cpus: "0.25", memory: 512M}

  artifact-init:
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/luma/docker/artifact-init.Dockerfile
    environment:
      LAE_ARTIFACT_S3_BUCKET: lae-artifacts-staging
      LAE_MINIO_INTERNAL_ENDPOINT: http://artifact-store:9000
      LAE_MINIO_ROOT_PASSWORD: ${LAE_MINIO_ROOT_PASSWORD}
      LAE_MINIO_ROOT_USER: ${LAE_MINIO_ROOT_USER}
      LAE_S3_API_ACCESS_KEY: ${LAE_S3_API_ACCESS_KEY}
      LAE_S3_API_SECRET_KEY: ${LAE_S3_API_SECRET_KEY}
      LAE_S3_WORKER_ACCESS_KEY: ${LAE_S3_WORKER_ACCESS_KEY}
      LAE_S3_WORKER_SECRET_KEY: ${LAE_S3_WORKER_SECRET_KEY}
      LAE_UPLOAD_S3_BUCKET: lae-uploads-staging
    depends_on:
      artifact-store: {condition: service_healthy}
    healthcheck:
      test: [CMD-SHELL, test -f /tmp/lae-artifact-init.ready]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 5
    deploy:
      resources:
        limits: {cpus: "0.20", memory: 512M}
        reservations: {cpus: "0.05", memory: 256M}

  valkey:
    image: valkey/valkey:9.1.0-alpine@sha256:a35428eba9043cc0b79dbe54100f0c92784f2de00ad09b01182bfb1c5c83d1bd
    platform: linux/amd64
    command:
      - sh
      - -ec
      - |
        umask 077
        printf 'bind 0.0.0.0\nprotected-mode yes\nrequirepass %s\nsave ""\nappendonly no\n' "$${VALKEY_PASSWORD}" >/tmp/valkey.conf
        exec valkey-server /tmp/valkey.conf
    environment:
      VALKEYCLI_AUTH: ${LAE_VALKEY_PASSWORD}
      VALKEY_PASSWORD: ${LAE_VALKEY_PASSWORD}
    healthcheck:
      test: [CMD-SHELL, valkey-cli ping | grep -q PONG]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5
    deploy:
      resources:
        limits: {cpus: "0.50", memory: 512M}
        reservations: {cpus: "0.10", memory: 128M}

volumes:
  artifact-data:
  postgres-data:
