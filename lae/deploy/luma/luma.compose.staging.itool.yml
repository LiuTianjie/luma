name: lae-platform-staging
compose: docker-compose.staging.yml
region: cn

# Live-cluster staging overlay for luma.itool.tech. Keep the platform control
# services on manager so their Nomad lifecycle does not depend on the lossy
# manager-to-lab relay. Tenant workloads still use the separately admitted
# manager/tecent runtime pool configured in Luma Control.
volumes:
  artifact-data:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/artifacts/v1
    accessMode: ReadWriteOnce
    initialize: empty
  postgres-data:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/postgres/v1
    accessMode: ReadWriteOnce
    initialize: empty

services:
  web:
    node: manager
    exposure: cn-edge
    domain: lae-staging.itool.tech
    port: 3000
  api:
    node: manager
    exposure: cn-edge
    domain: lae-api-staging.itool.tech
    port: 8080
  worker: {node: manager, exposure: none}
  template-smoke: {node: manager, exposure: none}
  agent-controller:
    node: manager
    exposure: cn-edge
    domain: lae-agent-staging.itool.tech
    port: 8081
  postgres: {node: manager, exposure: none}
  artifact-store:
    node: manager
    exposure: cn-edge
    domain: lae-artifacts-staging.itool.tech
    port: 9000
  artifact-init: {node: manager, exposure: none}
  valkey: {node: manager, exposure: none}
