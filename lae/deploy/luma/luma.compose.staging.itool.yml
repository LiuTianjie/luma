name: lae-platform-staging
compose: docker-compose.staging.yml
region: cn

# Live-cluster staging overlay for luma.itool.tech. Platform services and their
# primary data stay on manager-local storage. Off-node copies are asynchronous
# backup concerns and must never be part of the LAE runtime allocation path.
# Tenant workloads still use the separately admitted manager/tecent runtime
# pool configured in Luma Control.
volumes:
  artifact-data:
    local:
      node: manager
      path: /srv/luma/lae/staging/artifacts/v2
    adopted: true
  backup-data:
    local:
      node: manager
      path: /srv/luma/lae/staging/backups/v2
    adopted: true
  postgres-data:
    local:
      node: manager
      path: /srv/luma/lae/staging/postgres/v2
    adopted: true

services:
  web:
    node: manager
    exposure: cn-edge
    domain: lae-staging.itool.tech
    port: 3000
  api:
    node: manager
    exposure: cn-edge
    domain: lae-api-staging.itool.tech
    port: 8080
  worker: {node: manager, exposure: none}
  template-smoke: {node: manager, exposure: none}
  agent-controller:
    node: manager
    exposure: cn-edge
    domain: lae-agent-staging.itool.tech
    port: 8081
  postgres: {node: manager, exposure: none}
  artifact-store:
    node: manager
    exposure: cn-edge
    domain: lae-artifacts-staging.itool.tech
    port: 9000
  artifact-init: {node: manager, exposure: none}
  backup: {node: manager, exposure: none}
  valkey: {node: manager, exposure: none}
