name: lae-staging-storage-migration-v1
compose: docker-compose.yml
region: cn

# This one-off migration is intentionally pinned to manager because the source
# Docker volumes were created there by Luma <= 0.1.242. The target volumes are
# real Builder-hosted NFS mounts rendered by Luma >= 0.1.243.
volumes:
  postgres-target:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/postgres/v1
    accessMode: ReadWriteOnce
    initialize: empty
  artifact-target:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/artifacts/v1
    accessMode: ReadWriteOnce
    initialize: empty

services:
  copy-postgres: {node: manager, exposure: none}
  copy-artifacts: {node: manager, exposure: none}
