name: lae-staging-storage-migration-v2
compose: docker-compose.yml
region: cn

# Offline one-shot migration from the former remote NFS runtime layout to
# manager-local primary storage. Sources remain read-only and retained after
# verification so rollback never depends on this job.
volumes:
  postgres-source:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/postgres/v1
    accessMode: ReadWriteOnce
  artifact-source:
    storageClass: lae-staging-runtime-nfs
    path: lae/staging/artifacts/v1
    accessMode: ReadWriteOnce
  backup-source:
    storageClass: lae-staging-backups-nfs
    path: lae/staging/backups/v1
    accessMode: ReadWriteOnce
  postgres-target:
    local:
      node: manager
      path: /srv/luma/lae/staging/postgres/v2
    initialize: empty
  artifact-target:
    local:
      node: manager
      path: /srv/luma/lae/staging/artifacts/v2
    initialize: empty
  backup-target:
    local:
      node: manager
      path: /srv/luma/lae/staging/backups/v2
    initialize: empty

services:
  copy-postgres: {node: manager, exposure: none}
  copy-artifacts: {node: manager, exposure: none}
  copy-backups: {node: manager, exposure: none}
