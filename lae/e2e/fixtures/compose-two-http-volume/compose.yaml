services:
  web:
    build:
      context: ./web
    depends_on:
      - postgres
    expose:
      - "8080"
    labels:
      lae.role: http
      lae.health.path: /healthz
    volumes:
      - app-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  admin:
    build:
      context: ./admin
    expose:
      - "8081"
    labels:
      lae.role: http
      lae.health.path: /healthz
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  worker:
    build:
      context: ./worker
    labels:
      lae.role: worker
    volumes:
      - app-data:/data
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M

  postgres:
    image: postgres:17-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

volumes:
  app-data: {}
  pg-data: {}

