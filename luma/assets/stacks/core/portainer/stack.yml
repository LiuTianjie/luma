services:
  agent:
    image: portainer/agent:2.21.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - agent_network
    deploy:
      mode: global
      placement:
        constraints:
          - node.platform.os == linux

  portainer:
    image: portainer/portainer-ce:2.21.5
    command: -H tcp://tasks.agent:9001 --tlsskipverify
    ports:
      - target: 9443
        published: 9443
        protocol: tcp
        mode: host
    volumes:
      - portainer_data:/data
    networks:
      - agent_network
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.region == cn
      labels:
        - traefik.enable=false

networks:
  agent_network:
    driver: overlay
    attachable: true

volumes:
  portainer_data:
