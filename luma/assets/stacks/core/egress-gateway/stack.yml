services:
  mihomo:
    image: ${LUMA_EGRESS_IMAGE:-docker.1panel.live/metacubex/mihomo:latest}
    command: ["-d", "/root/.config/mihomo"]
    volumes:
      - /opt/luma/egress-gateway:/root/.config/mihomo
    ports:
      - target: 7890
        published: 7890
        protocol: tcp
        mode: host
      - target: 7890
        published: 7890
        protocol: udp
        mode: host
    networks:
      - egress
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
      placement:
        constraints:
          - node.labels.egress == true
      restart_policy:
        condition: any

networks:
  egress:
    external: true
