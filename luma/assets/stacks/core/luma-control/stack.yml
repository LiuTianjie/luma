services:
  luma-control:
    image: ${LUMA_CONTROL_IMAGE:-ghcr.io/liutianjie/luma-control:latest}
    command: ["python", "-m", "luma.control.server", "serve", "--host", "0.0.0.0", "--port", "8080"]
    environment:
      LUMA_CONTROL_STATE_DIR: /opt/luma/control
      LUMA_CONTROL_CONFIG: /opt/luma/luma.yaml
      DOCKER_API_VERSION: "1.44"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/v1/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    volumes:
      - /opt/luma/control:/opt/luma/control
      - /opt/luma/luma.yaml:/opt/luma/luma.yaml:ro
      - /opt/luma/stacks:/opt/luma/stacks
      - /opt/luma/routes:/opt/luma/routes
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - public
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
        monitor: 30s
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M
      placement:
        constraints:
          - node.labels.region == cn
          - node.labels.ingress == true
      labels:
        - traefik.enable=true
        - traefik.http.routers.luma-control.rule=Host(`${LUMA_CONTROL_DOMAIN:-luma.local}`)
        - traefik.http.routers.luma-control.entrypoints=websecure
        - traefik.http.routers.luma-control.tls.certresolver=letsencrypt
        - traefik.http.services.luma-control.loadbalancer.server.port=8080

networks:
  public:
    external: true
