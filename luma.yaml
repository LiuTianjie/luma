project:
  name: Luma

defaults:
  stackRoot: stacks
  routesRoot: routes
  publicNetwork: public
  entrypoint: websecure
  certResolver: letsencrypt

dns:
  provider: cloudflare
  zone: itool.tech
  zoneId: ac7105f330b0107c778ea8769bdfdc00
  zoneIdEnv: CLOUDFLARE_ZONE_ID
  apiTokenEnv: CLOUDFLARE_API_TOKEN
  edgeTarget: 8.130.148.30
  recordType: A
  ttl: 1
  proxied: false

portainer:
  webhookUrlEnv: PORTAINER_WEBHOOK_URL

git:
  autoCommit: false
  autoPush: false
  commitMessage: "deploy {name} to {region}"
