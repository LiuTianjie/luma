project: itool

providers:
  dns:
    type: cloudflare
    zone: itool.tech
    zoneId: ac7105f330b0107c778ea8769bdfdc00
    apiTokenEnv: CLOUDFLARE_API_TOKEN
    recordType: A
    ttl: 1
    proxied: false
  portainer:
    webhookUrlEnv: PORTAINER_WEBHOOK_URL

nodes:
  aly:
    host: aly
    publicIp: 8.130.148.30
    region: cn
    roles:
      - swarm-manager
      - edge
      - egress

defaults:
  exposure: cn-edge
  registry: ghcr.io/turning4th
  stackRoot: stacks
  routesRoot: routes
  publicNetwork: public
  egressNetwork: egress
  entrypoint: websecure
  certResolver: letsencrypt

git:
  autoCommit: false
  autoPush: false
  commitMessage: "deploy {name} to {region}"
